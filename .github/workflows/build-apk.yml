name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor
  run: |
    npm init -y
    npm install @capacitor/core @capacitor/cli @capacitor/android
    npx cap init "Golden Pay" "com.goldenpay.app" --web-dir=www

      - name: Create Web App
        run: |
          mkdir www

          cat > www/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Golden Pay</title>

            <style>
              body{
                margin:0;
                background:#000;
                color:white;
                font-family:Arial;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                flex-direction:column;
              }

              img{
                width:180px;
                border-radius:25px;
              }

              h1{
                color:gold;
                margin-top:25px;
              }
            </style>
          </head>

          <body>
            <img src="https://i.imgur.com/t0QwY9h.jpeg">
            <h1>Golden Pay</h1>
          </body>
          </html>
          EOF

      - name: Create Capacitor Config
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.goldenpay.app",
            "appName": "Golden Pay",
            "webDir": "www"
          }
          EOF

      - name: Add Android
        run: npx cap add android

      - name: Sync Android
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoldenPay-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
