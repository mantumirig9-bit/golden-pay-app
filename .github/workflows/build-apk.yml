name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Clean Project
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -rf android

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Web App
        run: |
          rm -rf www
          mkdir -p www

          cat > www/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Golden Pay</title>
            <style>
              body {
                margin: 0;
                background: #000;
                color: white;
                font-family: Arial, sans-serif;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
              }

              .logo {
                width: 190px;
                height: 190px;
                border-radius: 30px;
                object-fit: cover;
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
              }

              h1 {
                margin-top: 24px;
                color: #d4af37;
                font-size: 34px;
              }

              p {
                color: #aaa;
                font-size: 16px;
              }
            </style>
          </head>
          <body>
            <img class="logo" src="./splash-logo.jpg" />
            <h1>Golden Pay</h1>
            <p>Premium Partner</p>
          </body>
          </html>
          EOF

          if [ -f splash-logo.jpg ]; then
            cp splash-logo.jpg www/splash-logo.jpg
          else
            echo "No splash-logo.jpg found"
          fi

      - name: Create Capacitor Config
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.goldenpay.app",
            "appName": "Golden Pay",
            "webDir": "www"
          }
          EOF

      - name: Add Android Platform
        run: ./node_modules/.bin/cap add android

      - name: Sync Android
        run: ./node_modules/.bin/cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoldenPay-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
